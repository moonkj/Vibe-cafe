name: cafe_vibe
description: "시끄러운 도시 속, 나만의 고요한 카페 찾기"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.12.0

  # Maps
  google_maps_flutter: ^2.14.2

  # Location
  geolocator: ^14.0.2
  permission_handler: ^12.0.0

  # Noise Measurement (dB only — no audio file storage)
  noise_meter: ^5.1.0

  # UI & Animation
  flutter_animate: ^4.5.2
  lottie: ^3.3.1


  # Storage / Cache
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # HTTP (Places Autocomplete API)
  http: ^1.2.0

  # Utils
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/animations/
    - assets/map_style.json
    - assets/seed/brand_cafes.json
